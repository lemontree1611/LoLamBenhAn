<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YHCT</title>
  <script src="../../source/theme.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
    }

    :root[data-theme="dark"] body {
      background: #0f1115;
      color: #f5f7fb;
    }
  </style>
</head>
<body>
  <h1>COMING SOON</h1>
</body>
</html>
